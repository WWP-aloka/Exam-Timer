kind = "web"
previewPath = "/"
title = "EXAM TIMER - UoM"
version = "1.0.0"
id = "artifacts/exam-timer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20102

[services.development]
run = "pnpm --filter @workspace/exam-timer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/exam-timer", "run", "build" ]
publicDir = "artifacts/exam-timer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20102"
BASE_PATH = "/"
